<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đăng ký</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">

    <style>
        body {
            background: linear-gradient(135deg, #74ebd5, #9face6);
            height: 100vh;
        }

        .register-card {
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            padding: 30px;
            background: white;
        }

        .title {
            font-weight: 600;
            text-align: center;
            margin-bottom: 20px;
        }

        .btn-primary {
            border-radius: 8px;
        }
    </style>
</head>

<body>
<div class="d-flex justify-content-center align-items-center" style="height:100vh;">
    <div class="col-md-4">
        <div class="register-card">

            <h4 class="title">Đăng ký tài khoản</h4>

            <form th:action="@{/hospital/register}" method="post" th:object="${user}">

                <div class="form-group">
                    <label>Tên đăng nhập</label>
                    <input type="text" class="form-control" th:field="*{username}" placeholder="Nhập username">
                    <small class="text-danger"
                           th:if="${#fields.hasErrors('username')}"
                           th:errors="*{username}"></small>
                </div>
                <div class="form-group">
                    <label>Mật khẩu</label>
                    <input type="password" class="form-control" th:field="*{password}" placeholder="Nhập mật khẩu">
                    <small class="text-danger"
                           th:if="${#fields.hasErrors('password')}"
                           th:errors="*{password}"></small>
                </div>
                <button type="submit" class="btn btn-primary btn-block">
                    Đăng ký
                </button>
            </form>

        </div>
    </div>
</div>

</body>
</html>
